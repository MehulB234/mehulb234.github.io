<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GamerGauntlet — Wishlist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="topbar">The store with all a gamer's needs!</div>
    <nav>
      <div class="brand">
        <div class="logo">Gamer<span class="green">Gauntlet</span></div>
      </div>
      <button id="nav-toggle" class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">☰</button>
      <div class="navlinks" id="navlinks">
        <a href="../../homepage/index.html">Home</a>
        <a href="../Catalog/index.html">Catalog</a>
        <a href="../News/index.html">News</a>
        <a href="../About/index.html">About Us</a>
      </div>
      <div class="icons">
        <a class="icon" href="index.html" title="Wishlist">♥</a>
        <a class="icon" href="../Cart/index.html" title="Cart">🛒</a>
      </div>
    </nav>
  </header>

  <main class="wrap">
    <h1 class="page-title">My Wishlist</h1>

    <section class="empty-panel" role="region" aria-labelledby="wishlist-empty">
      <div class="empty-inner">
        <svg class="heart-ico" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="M12 21s-7-4.35-9-7.06C1.57 11.63 3.4 7 7 7c1.9 0 3 1.3 5 3 2-1.7 3.1-3 5-3 3.6 0 5.43 4.63 4 6.94C19 16.65 12 21 12 21z"/>
        </svg>
        <h2 id="wishlist-empty">Your wishlist is empty</h2>
        <p class="muted">Start adding games you'd like to buy later!</p>
        <div class="empty-actions">
          <a class="primary-btn" href="../Catalog/index.html">Browse Catalog</a>
        </div>
      </div>
    </section>

    <section class="saved-list" aria-hidden="true">
      <h2 class="section-title">Saved Games</h2>
      <div class="grid" id="wishlist-grid"></div>
    </section>

    <footer class="site-footer">
      <div class="brand-footer">Gamer<span class="accent">Gauntlet</span></div>
      <div class="muted-small">2026 GamerGauntlet</div>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
